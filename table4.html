<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
    <style>
    body {
        
    background: #2a7b9b;
background: linear-gradient(90deg, rgba(42, 123, 155, 0.63) 0%, rgba(156, 87, 199, 0.63) 60%, rgba(83, 83, 237, 0.58) 100%);

color: darkblue;
    }

input {
    width: 150%;
    padding: 5px;
    border: none;
    border-radius: 5px;
}

button {
    color: #2a7b9b;
    padding: 5px 50px;
    border: none;
    border-radius: 5px;
}


    </style>
  </head>
  <body>
    <table cellpadding="8" cellspacing="0">
      <tr>
        <td><h1>Contact Me</h1></td>
      </tr>
      <form>
        <tr><td><label for="name">Name:</label></td></tr>
        <tr><td><input type="text" placeholder="Enter Your Name..." /></td></tr>
        </tr>

        <tr><td><label for="email">Email:</label></td></tr>
        <tr><td><input type="email" placeholder="Enter your Email..."></td></tr>

        <tr><td><label>Message:</label></td></tr>
        <tr><td><input type="text" placeholder= "Let me know what you think."> </td></tr>  
        
        <tr><td><button>Send</button></td></tr>        

      </form>
    </table>
  </body>
</html>
